substitutions:
  _REGION: us-central1
  _AR_REPO: anchor
  _SERVICE: anchor

steps:
  # Build Docker image. Codegen (schema.graphql + src/gql/) runs inside the
  # Dockerfile, so no pre-step or build-time DB secret is needed here.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$COMMIT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:latest
      - .

  # Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE

  # Deploy to Cloud Run. Secrets are injected at runtime; the public URL is
  # inferred from the request host (auth.ts sets trustHost), so no NEXTAUTH_URL.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=AUTH_SECRET=AUTH_SECRET:latest,AUTH_GOOGLE_ID=AUTH_GOOGLE_ID:latest,AUTH_GOOGLE_SECRET=AUTH_GOOGLE_SECRET:latest,DATABASE_URL=DATABASE_URL:latest
      # Canonical public URL for Auth.js. Host auto-detection is unreliable
      # behind Cloud Run's proxy (it resolves to the container's 0.0.0.0:8080
      # bind address), so the OAuth redirect_uri must be pinned explicitly.
      - --update-env-vars=AUTH_URL=https://anchor.jtod.dev

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:latest

options:
  logging: CLOUD_LOGGING_ONLY
