substitutions:
  _REGION: us-central1
  _AR_REPO: anchor
  _SERVICE: anchor

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL

steps:
  # Generate schema.graphql and src/gql/ (gitignored, must be built before docker)
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        corepack enable && corepack prepare pnpm@latest --activate
        pnpm install --frozen-lockfile
        pnpm codegen
    secretEnv: [DATABASE_URL]

  # Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$COMMIT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:latest
      - .

  # Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=AUTH_SECRET=AUTH_SECRET:latest,AUTH_GOOGLE_ID=AUTH_GOOGLE_ID:latest,AUTH_GOOGLE_SECRET=AUTH_GOOGLE_SECRET:latest,DATABASE_URL=DATABASE_URL:latest
      - --set-env-vars=NEXTAUTH_URL=https://$_SERVICE-<hash>-uc.a.run.app

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:latest

options:
  logging: CLOUD_LOGGING_ONLY
